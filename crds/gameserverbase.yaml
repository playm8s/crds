apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameserverbases.pm8s.io
spec:
  group: pm8s.io
  names:
    kind: gameserverbase
    plural: gameserverbases
    singular: gameserverbase
    shortNames:
      - gameserverbase
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: gameserverbaseSpec defines the desired state of gameserverbase
              properties:
                game:
                  type: string
                  description: Game defines the game for this GameserverBase instance
                storageClassName:
                  type: string
                  description: StorageClassName defines the storageclass that will be used to
                    store the files for this GameserverBase
                storageStrategy:
                  type: string
                  description: StorageStrategy selects which storage mechanism will be used for
                    this GSB
                sourceRef:
                  type: object
                  properties:
                    type:
                      type: string
                      description: Type of source (url, url-from-url, git, container, steamcmd)
                    url:
                      type: object
                      properties:
                        url:
                          type: string
                          description: URL to fetch the tar.gz file from
                      required:
                        - url
                      description: URL source configuration
                    urlFromUrl:
                      type: object
                      properties:
                        url:
                          type: string
                          description: URL that returns another URL to fetch the tar.gz file from
                      required:
                        - url
                      description: URL-from-URL source configuration
                    git:
                      type: object
                      properties:
                        repository:
                          type: string
                          description: Git repository URL
                        ref:
                          type: string
                          description: Git reference (branch, tag, or commit hash)
                        path:
                          type: string
                          description: Path within the repository to use as the source
                      required:
                        - repository
                      description: Git source configuration
                    container:
                      type: object
                      properties:
                        image:
                          type: string
                          description: Container image name
                        path:
                          type: string
                          description: Path within the container to use as the source
                      required:
                        - image
                      description: Container source configuration
                    steamcmd:
                      type: object
                      properties:
                        appid:
                          type: string
                          description: Steam application ID
                        anonymousDownload:
                          type: boolean
                          description: Whether to download anonymously (default true)
                      required:
                        - appid
                      description: SteamCMD source configuration
                  required:
                    - type
                  description: SourceRef defines the source from which to fetch the base files
              required:
                - game
                - storageClassName
                - storageStrategy
                - sourceRef
            status:
              type: object
              description: gameserverbaseStatus defines the observed state of gameserverbase
              properties:
                conditions:
                  type: array
                  description: Conditions describing the current state
                  items:
                    type: object
                    description: Condition contains details for one aspect of the current state of
                      this API Resource.
                    properties: {}
                    required: []
      subresources:
        status: {}
