apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameserverbases.pm8s.io
spec:
  group: pm8s.io
  names:
    kind: gameserverbase
    plural: gameserverbases
    singular: gameserverbase
    shortNames:
      - gameserverbase
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: gameserverbaseSpec defines the desired state of gameserverbase
              properties:
                game:
                  type: string
                  description: Game defines the game for this GameserverBase instance
                storageClassName:
                  type: string
                  description: StorageClassName defines the storageclass that will be used to
                    store the files for this GameserverBase
                storageStrategy:
                  type: string
                  description: StorageStrategy selects which storage mechanism will be used for
                    this GSB
              required:
                - game
                - storageClassName
                - storageStrategy
            status:
              type: object
              description: gameserverbaseStatus defines the observed state of gameserverbase
              properties:
                conditions:
                  type: array
                  description: Conditions describing the current state
                  items:
                    type: object
                    description: Condition contains details for one aspect of the current state of
                      this API Resource.
                    properties: {}
                    required: []
      subresources:
        status: {}
