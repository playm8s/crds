apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameserveroverlays.pm8s.io
spec:
  group: pm8s.io
  names:
    kind: gameserveroverlay
    plural: gameserveroverlays
    singular: gameserveroverlay
    shortNames:
      - gameserveroverlay
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: gameserveroverlaySpec defines the desired state of
                gameserveroverlay
              properties:
                game:
                  type: string
                  description: Game defines the game for this GameserverOverlay instance
                persistentVolumeClaim:
                  type: object
                  properties:
                    accessModes:
                      type: array
                      items:
                        type: string
                      description: "accessModes contains the desired access modes the volume should
                        have. More info:
                        https://kubernetes.io/docs/concepts/storage/persistent-\
                        volumes#access-modes-1"
                    dataSource:
                      type: object
                      properties:
                        apiGroup:
                          type: string
                          description: APIGroup is the group for the resource being referenced. If
                            APIGroup is not specified, the specified Kind must
                            be in the core API group. For any other third-party
                            types, APIGroup is required.
                        kind:
                          type: string
                          description: Kind is the type of resource being referenced
                        name:
                          type: string
                          description: Name is the name of resource being referenced
                      required:
                        - kind
                        - name
                    dataSourceRef:
                      type: object
                      properties:
                        apiGroup:
                          type: string
                          description: APIGroup is the group for the resource being referenced. If
                            APIGroup is not specified, the specified Kind must
                            be in the core API group. For any other third-party
                            types, APIGroup is required.
                        kind:
                          type: string
                          description: Kind is the type of resource being referenced
                        name:
                          type: string
                          description: Name is the name of resource being referenced
                        namespace:
                          type: string
                          description: Namespace is the namespace of resource being referenced Note that
                            when a namespace is specified, a
                            gateway.networking.k8s.io/ReferenceGrant object is
                            required in the referent namespace to allow that
                            namespace\'s owner to accept the reference. See the
                            ReferenceGrant documentation for details. (Alpha)
                            This field requires the
                            CrossNamespaceVolumeDataSource feature gate to be
                            enabled.
                      required:
                        - kind
                        - name
                    resources:
                      type: object
                      properties:
                        limits:
                          type: object
                          properties: {}
                          description: "Limits describes the maximum amount of compute resources allowed.
                            More info:
                            https://kubernetes.io/docs/concepts/configuration/m\
                            anage-resources-containers/"
                        requests:
                          type: object
                          properties: {}
                          description: "Requests describes the minimum amount of compute resources
                            required. If Requests is omitted for a container, it
                            defaults to Limits if that is explicitly specified,
                            otherwise to an implementation-defined value.
                            Requests cannot exceed Limits. More info:
                            https://kubernetes.io/docs/concepts/configuration/m\
                            anage-resources-containers/"
                    selector:
                      type: object
                      properties:
                        matchExpressions:
                          type: array
                          items:
                            type: object
                            properties:
                              key:
                                type: string
                                description: key is the label key that the selector applies to.
                              operator:
                                type: string
                                description: operator represents a key\'s relationship to a set of values. Valid
                                  operators are In, NotIn, Exists and
                                  DoesNotExist.
                              values:
                                type: array
                                items:
                                  type: string
                                description: values is an array of string values. If the operator is In or
                                  NotIn, the values array must be non-empty. If
                                  the operator is Exists or DoesNotExist, the
                                  values array must be empty. This array is
                                  replaced during a strategic merge patch.
                            required:
                              - key
                              - operator
                          description: matchExpressions is a list of label selector requirements. The
                            requirements are ANDed.
                        matchLabels:
                          type: object
                          properties: {}
                          description: matchLabels is a map of {key,value} pairs. A single {key,value} in
                            the matchLabels map is equivalent to an element of
                            matchExpressions, whose key field is \"key\", the
                            operator is \"In\", and the values array contains
                            only \"value\". The requirements are ANDed.
                    storageClassName:
                      type: string
                      description: "storageClassName is the name of the StorageClass required by the
                        claim. More info:
                        https://kubernetes.io/docs/concepts/storage/persistent-\
                        volumes#class-1"
                    volumeAttributesClassName:
                      type: string
                      description: "volumeAttributesClassName may be used to set the
                        VolumeAttributesClass used by this claim. If specified,
                        the CSI driver will create or update the volume with the
                        attributes defined in the corresponding
                        VolumeAttributesClass. This has a different purpose than
                        storageClassName, it can be changed after the claim is
                        created. An empty string or nil value indicates that no
                        VolumeAttributesClass will be applied to the claim. If
                        the claim enters an Infeasible error state, this field
                        can be reset to its previous value (including nil) to
                        cancel the modification. If the resource referred to by
                        volumeAttributesClass does not exist, this
                        PersistentVolumeClaim will be set to a Pending state, as
                        reflected by the modifyVolumeStatus field, until such as
                        a resource exists. More info:
                        https://kubernetes.io/docs/concepts/storage/volume-attr\
                        ibutes-classes/"
                    volumeMode:
                      type: string
                      description: volumeMode defines what type of volume is required by the claim.
                        Value of Filesystem is implied when not included in
                        claim spec.
                    volumeName:
                      type: string
                      description: volumeName is the binding reference to the PersistentVolume backing
                        this claim.
                  description: PersistentVolumeClaim defines the PVC configuration for the module
                storageStrategy:
                  type: string
                  description: StorageStrategy selects which storage mechanism will be used for
                    this GSB
                sourceRef:
                  type: object
                  properties:
                    type:
                      type: string
                      description: Type of source (url, url-from-url, git, container, steamcmd)
                    url:
                      type: object
                      properties:
                        url:
                          type: string
                          description: URL to fetch the tar.gz file from
                      required:
                        - url
                      description: URL source configuration
                    urlFromUrl:
                      type: object
                      properties:
                        url:
                          type: string
                          description: URL that returns another URL to fetch the tar.gz file from
                      required:
                        - url
                      description: URL-from-URL source configuration
                    git:
                      type: object
                      properties:
                        repository:
                          type: string
                          description: Git repository URL
                        ref:
                          type: string
                          description: Git reference (branch, tag, or commit hash)
                        path:
                          type: string
                          description: Path within the repository to use as the source
                      required:
                        - repository
                      description: Git source configuration
                    container:
                      type: object
                      properties:
                        image:
                          type: string
                          description: Container image name
                        path:
                          type: string
                          description: Path within the container to use as the source
                      required:
                        - image
                      description: Container source configuration
                    steamcmd:
                      type: object
                      properties:
                        appid:
                          type: string
                          description: Steam application ID
                        anonymousDownload:
                          type: boolean
                          description: Whether to download anonymously (default true)
                      required:
                        - appid
                      description: SteamCMD source configuration
                  required:
                    - type
                  description: SourceRef defines the source from which to fetch the overlay files
                target:
                  type: string
                  description: Target defines the target path where files will be placed, relative
                    to the gameserver root directory
              required:
                - game
                - storageStrategy
                - sourceRef
                - target
            status:
              type: object
              description: gameserveroverlayStatus defines the observed state of
                gameserveroverlay
              properties:
                conditions:
                  type: array
                  description: Conditions describing the current state
                  items:
                    type: object
                    description: Condition contains details for one aspect of the current state of
                      this API Resource.
                    properties: {}
                    required: []
      subresources:
        status: {}
